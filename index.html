<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>boreal music</title>
  <meta name="description" content="DJ sets caught on camera, more music on the way.">
  <meta property="og:title" content="boreal music">
  <meta property="og:description" content="DJ sets caught on camera, more music on the way.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="og-image.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="boreal music">
  <meta name="twitter:description" content="DJ sets caught on camera, more music on the way.">
  <meta name="twitter:image" content="og-image.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Calistoga&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles-base.css">
  <style>
    /* ── collection page layout ── */
    .collection-page {
      min-height: 100vh;
      padding: var(--header-h) var(--gutter) 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 5;
    }

    .collection-header {
      width: min(var(--content-max), 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 0 56px;
      gap: 12px;
    }

    .collection-title {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: var(--white);
    }

    .collection-tagline {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--faint);
    }
    .collection-tagline em {
      font-style: italic;
      color: var(--dim);
    }
    @media (max-width: 600px) {
      .collection-tagline { text-align: center; }
    }

    /* ── cards grid ── */
    .cards-grid {
      width: min(var(--content-max), 100%);
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(320px, 100%), 1fr));
      gap: 24px;
    }

    /* ── edition card ── */
    .edition-card {
      display: block;
      text-decoration: none;
      position: relative;
    }

    .edition-card.is-soon {
      opacity: 0.4;
      pointer-events: none;
    }

    .card-artwork {
      width: 100%;
      aspect-ratio: 4 / 5;
      position: relative;
      overflow: hidden;
      background-color: #080808;
    }

    /* Cover photo (boreal_01 only) */
    .card-photo {
      position: absolute;
      inset: 0;
      background-image: url('boreal_01_cover.jpg');
      background-size: cover;
      background-position: center;
      transition: transform 0.6s var(--ease-out-expo);
    }

    .edition-card:not(.is-soon):hover .card-photo {
      transform: scale(1.03);
    }

    /* ─────────────────────────────────────────────────
       GLOW LAYERS — same PNGs as edition hero, heavily
       zoomed + blurred to create abstract color blobs.
       mix-blend-mode: screen makes them additive light.
    ───────────────────────────────────────────────── */
    .card-glow {
      position: absolute;
      inset: -50px; /* overshoot to hide blur edge fade */
      background-size: 450%;
      background-repeat: no-repeat;
      filter: blur(38px) saturate(2.4);
      mix-blend-mode: screen;
      will-change: opacity;
    }

    .card-glow--green  { background-image: url('boreal_hero/05_glow green.png');  background-position: 28% 38%; }
    .card-glow--blue   { background-image: url('boreal_hero/06_glow blue.png');   background-position: 72% 62%; }
    .card-glow--orange { background-image: url('boreal_hero/07_glow orange.png'); background-position: 50% 50%; }

    /* Different periods + negative delays → mid-cycle start, never sync */
    @keyframes card-glow-a {
      0%, 100% { opacity: 0.08; }
      50%       { opacity: 1.00; }
    }
    @keyframes card-glow-b {
      0%, 100% { opacity: 0.10; }
      50%       { opacity: 1.00; }
    }
    @keyframes card-glow-c {
      0%, 100% { opacity: 0.06; }
      50%       { opacity: 0.95; }
    }

    .card-glow--green  { animation: card-glow-a 5200ms -2600ms ease-in-out infinite; }
    .card-glow--blue   { animation: card-glow-b 6800ms -1700ms ease-in-out infinite; }
    .card-glow--orange { animation: card-glow-c 4000ms -1000ms ease-in-out infinite; }

    /* ── card body ── */
    .card-body {
      padding: 16px 0 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-label {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--white);
    }

    .card-meta {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--faint);
      text-transform: lowercase;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .card-soon-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      color: var(--faint);
      text-transform: lowercase;
    }

    /* ── footer ── */
    .collection-footer {
      width: min(var(--content-max), 100%);
      margin-top: 80px;
      padding-top: 32px;
      border-top: 1px solid var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 24px;
    }

    .footer-tagline {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      color: var(--faint);
      text-transform: lowercase;
    }

    .footer-credits {
      font-family: var(--font-mono);
      font-size: 0.55rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: rgba(245,243,240,0.25);
      text-transform: lowercase;
    }

    .footer-link {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.2s;
    }
    .footer-link:hover { color: var(--white); }

    @media (max-width: 600px) {
      .collection-footer { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to content</a>

  <canvas id="grain"></canvas>

  <header id="site-header">
    <a href="/boreal/" class="header-logo">boreal music</a>
    <nav>
      <a href="/boreal/01/" class="active">_01</a>
      <a href="#" class="nav-link--disabled" aria-disabled="true" tabindex="-1">_02</a>
      <a href="#" class="nav-link--disabled" aria-disabled="true" tabindex="-1">_03</a>
    </nav>
  </header>

  <main class="collection-page" role="main" id="main-content">
    <div class="collection-header">
      <h1 class="collection-title">boreal</h1>
      <p class="collection-tagline">/ˈbɔːrɪəl/ &nbsp;·&nbsp; <em>adj.</em> &nbsp;·&nbsp; of the north or northern regions.</p>
    </div>

    <div class="cards-grid">

      <!-- boreal_01 — cover photo + glow overlay -->
      <a href="01/" class="edition-card">
        <div class="card-artwork">
          <div class="card-photo"></div>
          <div class="card-glow card-glow--green"></div>
          <div class="card-glow card-glow--blue"></div>
          <div class="card-glow card-glow--orange"></div>
        </div>
        <div class="card-body">
          <div class="card-label">boreal_01</div>
          <div class="card-meta">rotterdam noord — 06.03.2026</div>
          <div class="card-tags">
            <span class="tag">percy thrills</span>
            <span class="tag">petsq</span>
          </div>
        </div>
      </a>

      <!-- boreal_02 — coming soon -->
      <div class="edition-card is-soon" aria-hidden="true">
        <div class="card-artwork">
          <div class="card-glow card-glow--green"  style="animation-delay:-900ms"></div>
          <div class="card-glow card-glow--blue"   style="animation-delay:-4300ms"></div>
          <div class="card-glow card-glow--orange" style="animation-delay:-2100ms"></div>
        </div>
        <div class="card-body">
          <div class="card-label">boreal_02</div>
          <div class="card-meta">—</div>
          <div class="card-tags">
            <span class="card-soon-label">soon</span>
          </div>
        </div>
      </div>

      <!-- boreal_03 — coming soon -->
      <div class="edition-card is-soon" aria-hidden="true">
        <div class="card-artwork">
          <div class="card-glow card-glow--green"  style="animation-delay:-3800ms"></div>
          <div class="card-glow card-glow--blue"   style="animation-delay:-700ms"></div>
          <div class="card-glow card-glow--orange" style="animation-delay:-3100ms"></div>
        </div>
        <div class="card-body">
          <div class="card-label">boreal_03</div>
          <div class="card-meta">—</div>
          <div class="card-tags">
            <span class="card-soon-label">soon</span>
          </div>
        </div>
      </div>

    </div>

    <footer class="collection-footer">
      <p class="footer-tagline">by <a href="https://www.instagram.com/percythrillz/" target="_blank" rel="noopener noreferrer" class="footer-link">percy thrills</a> &amp; <a href="https://www.instagram.com/petsq010/" target="_blank" rel="noopener noreferrer" class="footer-link">petsq</a></p>
      <p class="footer-credits">boreal music © 2026</p>
    </footer>
  </main>

  <script src="js/grain.js"></script>
  <script>
    {
      // ── header scroll state ──
      const header = document.getElementById('site-header');
      window.addEventListener('scroll', () => {
        header.classList.toggle('is-scrolled', window.scrollY > 20);
      }, { passive: true });
    }
  </script>
</body>
</html>
